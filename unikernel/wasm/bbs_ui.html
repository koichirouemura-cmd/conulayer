<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BBS on unikernel</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0d1117;color:#e6edf3;font-family:monospace;padding:20px;max-width:600px;margin:0 auto}h1{color:#58a6ff;margin-bottom:16px;font-size:18px}small{color:#8b949e;font-weight:normal;margin-left:8px;font-size:12px}textarea{width:100%;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:10px;border-radius:6px;font-family:monospace;font-size:13px;resize:vertical;min-height:80px}textarea:focus{outline:none;border-color:#58a6ff}button{margin-top:8px;background:#238636;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px}button:hover{background:#2ea043}#msgs{margin-top:20px;display:flex;flex-direction:column;gap:10px}.msg{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-size:13px;word-break:break-all;line-height:1.5}.empty{color:#8b949e;font-size:13px}</style></head><body><h1>BBS <small>on unikernel WASM</small></h1><textarea id="t" placeholder="Ctrl+Enter to post" maxlength="200"></textarea><button onclick="post()">Post</button><div id="msgs"><p class="empty">Loading...</p></div><script>async function post(){const t=document.getElementById("t"),m=t.value.trim();if(!m)return;try{await fetch("/bbs/post",{method:"POST",body:m});t.value="";load()}catch(e){}}async function load(){try{const r=await fetch("/bbs/api/messages"),d=await r.json();const e=document.getElementById("msgs");if(!d.messages||!d.messages.length){e.innerHTML='<p class="empty">No messages yet</p>';return}e.innerHTML=d.messages.slice().reverse().map(m=>'<div class="msg">'+m.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")+'</div>').join("")}catch(e){}}document.getElementById("t").addEventListener("keydown",e=>{if(e.ctrlKey&&e.key==="Enter")post()});load();setInterval(load,3000)</script></body></html>
