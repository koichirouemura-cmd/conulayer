<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Text Editor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; color: #d0d0d0; font-family: monospace; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #111; padding: 10px 16px; font-size: 13px; color: #888; border-bottom: 1px solid #333; }
  #main { display: flex; flex: 1; overflow: hidden; }
  #sidebar { width: 220px; background: #222; border-right: 1px solid #333; display: flex; flex-direction: column; }
  #sidebar h2 { font-size: 11px; color: #666; padding: 10px 12px 6px; text-transform: uppercase; letter-spacing: 1px; }
  #file-list { flex: 1; overflow-y: auto; }
  .file-item { padding: 8px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #2a2a2a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-item:hover { background: #2d2d2d; }
  .file-item.active { background: #1e3a5f; color: #7fb3f5; }
  #new-btn { margin: 10px; padding: 7px; background: #2a2a2a; border: 1px solid #444; color: #aaa; cursor: pointer; font-size: 12px; }
  #new-btn:hover { background: #333; color: #ddd; }
  #editor-area { flex: 1; display: flex; flex-direction: column; }
  #toolbar { padding: 8px 12px; background: #1e1e1e; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; }
  #filename-input { background: #2a2a2a; border: 1px solid #444; color: #ccc; padding: 5px 8px; font-size: 13px; font-family: monospace; width: 200px; }
  #save-btn { padding: 5px 14px; background: #1e3a5f; border: 1px solid #2a5a8f; color: #7fb3f5; cursor: pointer; font-size: 12px; }
  #save-btn:hover { background: #254a6f; }
  #textarea { flex: 1; background: #1a1a1a; color: #d0d0d0; border: none; padding: 16px; font-size: 14px; font-family: monospace; resize: none; line-height: 1.6; outline: none; }
  #status { padding: 4px 12px; background: #111; font-size: 11px; color: #555; border-top: 1px solid #2a2a2a; }
  #status.saved { color: #4a9; }
  #status.modified { color: #a84; }
  #status.syncing { color: #55a; }
</style>
</head>
<body>
<div id="header">Text Editor — AI-Native Unikernel Demo</div>
<div id="main">
  <div id="sidebar">
    <h2>Files</h2>
    <div id="file-list"></div>
    <button id="new-btn">+ New File</button>
  </div>
  <div id="editor-area">
    <div id="toolbar">
      <input id="filename-input" type="text" placeholder="filename.txt" />
      <button id="save-btn">Save</button>
    </div>
    <textarea id="textarea" placeholder="Select a file or create a new one..."></textarea>
    <div id="status">Ready</div>
  </div>
</div>
<script>
const API = '';
let currentFile = null;
let isDirty = false;
let isFocused = false;

const fileList  = document.getElementById('file-list');
const textarea  = document.getElementById('textarea');
const nameInput = document.getElementById('filename-input');
const status    = document.getElementById('status');

function setStatus(msg, cls) {
  status.textContent = msg;
  status.className = cls || '';
}

async function loadFiles() {
  try {
    const r = await fetch(API + '/editor/api/files');
    const files = await r.json();
    fileList.innerHTML = '';
    files.forEach(f => {
      const div = document.createElement('div');
      div.className = 'file-item' + (f === currentFile ? ' active' : '');
      div.textContent = f;
      div.onclick = () => openFile(f);
      fileList.appendChild(div);
    });
  } catch(e) { setStatus('Connection error', ''); }
}

async function openFile(name) {
  if (isDirty && currentFile && !confirm('Unsaved changes. Continue?')) return;
  try {
    const r = await fetch(API + '/editor/api/read', {method:'POST', body: name});
    if (!r.ok) { setStatus('File not found', ''); return; }
    textarea.value = await r.text();
    currentFile = name;
    nameInput.value = name;
    isDirty = false;
    setStatus('Loaded: ' + name, 'saved');
    await loadFiles();
  } catch(e) { setStatus('Read error', ''); }
}

async function saveFile() {
  const name = nameInput.value.trim();
  if (!name) { setStatus('Enter filename', ''); return; }
  if (!/^[a-zA-Z0-9_\-.]+\.txt$/.test(name)) { setStatus('Invalid filename (use .txt)', ''); return; }
  try {
    setStatus('Saving...', 'syncing');
    const r = await fetch(API + '/editor/api/save', {
      method: 'POST',
      body: name + '\n' + textarea.value
    });
    if (r.ok) {
      currentFile = name;
      isDirty = false;
      setStatus('Saved: ' + name, 'saved');
      await loadFiles();
    } else {
      setStatus('Save failed (' + r.status + ')', '');
    }
  } catch(e) { setStatus('Save error', ''); }
}

// ポーリング: 2秒ごとに最新を取得（編集中・フォーカス中は更新しない）
async function poll() {
  await loadFiles();
  if (currentFile && !isDirty && !isFocused) {
    try {
      const r = await fetch(API + '/editor/api/read', {method:'POST', body: currentFile});
      if (r.ok) {
        const content = await r.text();
        if (content !== textarea.value) {
          textarea.value = content;
          setStatus('Synced: ' + currentFile, 'saved');
        }
      }
    } catch(e) {}
  }
}

textarea.addEventListener('input', () => { isDirty = true; setStatus('Modified', 'modified'); });
textarea.addEventListener('focus', () => { isFocused = true; });
textarea.addEventListener('blur',  () => { isFocused = false; });

document.getElementById('save-btn').onclick = saveFile;
document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFile(); } });

document.getElementById('new-btn').onclick = () => {
  if (isDirty && !confirm('Unsaved changes. Continue?')) return;
  currentFile = null;
  nameInput.value = '';
  textarea.value = '';
  isDirty = false;
  setStatus('New file', '');
  loadFiles();
};

loadFiles();
setInterval(poll, 2000);
</script>
</body>
</html>
